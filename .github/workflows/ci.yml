name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check .

      - name: Check imports resolve
        run: |
          SPOTIFY_CLIENT_ID=test SPOTIFY_CLIENT_SECRET=test python -c "
          from config import BASE_DIR, LIBRARY_DIR, COVERS_DIR, SCOPES
          from spotify_curation.client import get_spotify
          from spotify_curation.covers import SERIES1_GENERATORS, SERIES2_GENERATORS, upload_cover
          print('All imports OK')
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install pytest

      - name: Run tests
        env:
          SPOTIFY_CLIENT_ID: test
          SPOTIFY_CLIENT_SECRET: test
        run: python -m pytest tests/ -v
